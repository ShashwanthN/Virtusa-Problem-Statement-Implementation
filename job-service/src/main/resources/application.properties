spring.application.name=job-service

spring.datasource.url=${JOB_DB_URL:jdbc:mysql://localhost:3306/job_service}
spring.datasource.username=${JOB_DB_USERNAME:root}
spring.datasource.password=${JOB_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

clients.quiz.base-url=${QUIZ_SERVICE_BASE_URL:http://localhost:8081}
clients.quiz.create-path=${QUIZ_SERVICE_CREATE_PATH:/api/quizzes}
clients.quiz.start-test-path=${QUIZ_SERVICE_START_TEST_PATH:/api/quizzes/{quizId}/start-test}
clients.quiz.submit-test-path=${QUIZ_SERVICE_SUBMIT_TEST_PATH:/api/quizzes/{quizId}/submit-test}

clients.python-ai.base-url=${PYTHON_AI_SERVICE_BASE_URL:http://localhost:8000}
clients.python-ai.match-path=${PYTHON_AI_MATCH_PATH:/api/match}
clients.python-ai.index-path=${PYTHON_AI_INDEX_PATH:/api/jobs/index}
clients.python-ai.generate-quiz-path=${PYTHON_AI_GENERATE_QUIZ_PATH:/api/quiz/generate}
