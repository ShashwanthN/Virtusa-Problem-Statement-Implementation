spring.datasource.url=jdbc:h2:mem:job_service_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

clients.quiz.base-url=http://localhost:8081
clients.quiz.create-path=/api/quizzes
clients.quiz.start-test-path=/api/quizzes/{quizId}/start-test
clients.quiz.submit-test-path=/api/quizzes/{quizId}/submit-test
clients.python-ai.base-url=http://localhost:8000
clients.python-ai.match-path=/api/match
clients.python-ai.index-path=/api/jobs/index
clients.python-ai.generate-quiz-path=/api/quiz/generate
